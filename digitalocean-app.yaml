name: shadowaudit
region: nyc
ingress:
  rules:
    - component:
        name: backend
      match:
        path:
          prefix: /api
    - component:
        name: frontend
      match:
        path:
          prefix: /
services:
  - name: backend
    github:
      repo: your-github-username/shadowaudit
      branch: main
      deploy_on_push: true
    dockerfile_path: backend/Dockerfile
    source_dir: backend
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
      initial_delay_seconds: 15
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: SUPABASE_URL
        scope: RUN_TIME
        type: SECRET
        value: your-supabase-url
      - key: SUPABASE_KEY
        scope: RUN_TIME
        type: SECRET
        value: your-supabase-key
      - key: OPENAI_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: your-openai-api-key
      - key: OSV_API_URL
        scope: RUN_TIME
        type: GENERAL
        value: https://api.osv.dev/v1/query
  - name: frontend
    github:
      repo: your-github-username/shadowaudit
      branch: main
      deploy_on_push: true
    dockerfile_path: frontend/Dockerfile
    source_dir: frontend
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: NEXT_PUBLIC_API_URL
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
        value: /api
      - key: BACKEND_INTERNAL_URL
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
        value: http://backend:8000
      - key: NEXT_PUBLIC_SUPABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
        value: your-supabase-url
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: your-supabase-anon-key
